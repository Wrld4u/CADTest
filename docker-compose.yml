services:
    db:
        image: postgres:16-alpine
        command:
            [
                "postgres",
                "-c", "max_connections=300",
                "-c", "shared_buffers=256MB",
                "-c", "effective_cache_size=768MB",
                "-c", "work_mem=4MB",
                "-c", "maintenance_work_mem=64MB",
                "-c", "wal_buffers=16MB",
                "-c", "checkpoint_timeout=15min",
                "-c", "max_wal_size=1GB",
                "-c", "synchronous_commit=off",
                "-c", "random_page_cost=1.1"
            ]
        environment:
            POSTGRES_DB: reservations
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U postgres -d reservations"]
            interval: 5s
            timeout: 5s
            retries: 10

    redis:
        image: redis:7-alpine
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 5s
            timeout: 3s
            retries: 10

    app:
        build:
            context: .
            dockerfile: Dockerfile
        depends_on:
            db:
                condition: service_healthy
            redis:
                condition: service_healthy
        environment:
            PORT: 3000
            DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@db:5432/reservations?schema=public&connect_timeout=5&connection_limit=40&pool_timeout=20}
            REDIS_URL: redis://redis:6379
            RESERVE_MAX_IN_FLIGHT: ${RESERVE_MAX_IN_FLIGHT:-96}
        ports:
            - '3000:3000'
